
name: cashier_system
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.5 <4.0.0'

dependencies:
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  #! Flutter Get state management
  get: ^4.6.6

  #! Data Persistence
  get_storage: ^2.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  #! HTTP Requests
  http: ^1.2.0

  #! Internationalization
  intl: ^0.19.0

  #! Responsive Design
  responsive_builder: ^0.7.0
  flutter_screenutil: ^5.9.0
  window_manager: ^0.3.8

  #! Image / Icons / SVG
  flutter_svg: ^2.0.10+1
  lottie: ^3.0.0
  font_awesome_flutter: ^10.7.0

  #! Widgets
  drop_down_list: ^0.0.5
  floating_bubbles: ^2.6.2
  file_picker: ^8.0.0+1
  cached_network_image: ^3.3.1
  mirai_dropdown_menu: ^0.0.8+2
  flutter_simple_calculator: ^2.2.5

  #! Designing
  google_fonts: ^6.1.0
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  restart_app: ^1.2.1
  flutter_local_notifications: ^17.1.2
  # android_alarm_manager: ^2.0.0
  dropdown_search: ^5.0.2
  image_picker: ^1.1.2
  cron: ^0.6.1
  #! Printing
  printing: ^5.9.2
  screenshot: ^1.3.0
  pdf: ^3.3.0
  process: ^4.2.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/
    - assets/icons/  
    - assets/lottie/  
    - assets/cashier_system.db
